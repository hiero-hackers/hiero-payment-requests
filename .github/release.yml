# Categorises auto-generated release notes by PR label.
changelog:
  exclude:
    labels: [skip-changelog]
  categories:
    - title: Features
      labels: [enhancement, feature]
    - title: Fixes
      labels: [bug, fix]
    - title: Security
      labels: [security]
    - title: Documentation
      labels: [documentation]
    - title: Dependencies & CI
      labels: [dependencies, ci, github_actions]
    - title: Other changes
      labels: ["*"]
