name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck, lint, test, build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Zero runtime dependencies and public-registry devDependencies: this
      # CI needs no tokens, no package grants, no registry configuration.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:examples
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run docs
      - run: npm run lint:package
      - run: npm run test:pack

  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Every commit carries a Signed-off-by trailer
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list --no-merges "$BASE".."$HEAD"); do
            author=$(git show -s --format='%an' "$sha")
            case "$author" in *"[bot]") continue ;; esac
            if ! git show -s --format=%B "$sha" | grep -q '^Signed-off-by: '; then
              echo "::error::commit $sha lacks a Signed-off-by trailer (git commit -s)"
              missing=1
            fi
          done
          exit $missing
